<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animate Cyber — The Easy Button for Network Traffic in Cyber Environments</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700;800&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; font-size:16px; }

:root {
--bg:         #060A10;
--bg2:        #080D15;
--bg3:        #0A1020;
--surface:    #0D1526;
--border:     rgba(14,165,233,0.12);
--border2:    rgba(14,165,233,0.22);
--border3:    rgba(255,255,255,0.08);
--blue:       #0EA5E9;
--blue-dim:   rgba(14,165,233,0.12);
--blue-glow:  rgba(14,165,233,0.3);
--amber:      #F59E0B;
--amber-dim:  rgba(245,158,11,0.1);
--red:        #EF4444;
--green:      #10B981;
--text:       #F0F4F8;
--text2:      rgba(240,244,248,0.82);
--text3:     rgba(240,244,248,0.62);
--font-display: 'Barlow Condensed', sans-serif;
--font-body:    'IBM Plex Sans', sans-serif;
--font-mono:    'IBM Plex Mono', monospace;
}

body {
font-family: var(--font-body);
background: var(--bg);
color: var(--text);
overflow-x: hidden;
line-height: 1.6;
}

body::after {
content:’’; position:fixed; inset:0;
background-image: url(“data:image/svg+xml,%3Csvg viewBox=‘0 0 256 256’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cfilter id=‘noise’%3E%3CfeTurbulence type=‘fractalNoise’ baseFrequency=‘0.9’ numOctaves=‘4’ stitchTiles=‘stitch’/%3E%3C/filter%3E%3Crect width=‘100%25’ height=‘100%25’ filter=‘url(%23noise)’ opacity=‘0.04’/%3E%3C/svg%3E”);
pointer-events:none; z-index:9999; opacity:0.22;
}

::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--blue); border-radius:2px; }

/* ── NAV ── */
nav {
position:fixed; top:0; left:0; right:0; z-index:1000;
background:rgba(6,10,16,0.92);
backdrop-filter:blur(20px);
border-bottom:1px solid var(--border);
}
.nav-wrap {
max-width:1400px; margin:0 auto;
padding:0 1.5rem; height:64px;
display:flex; align-items:center; justify-content:space-between;
}

/* STACKED LOGO */
.nav-logo {
display:flex; align-items:center; gap:0.85rem;
cursor:pointer; text-decoration:none;
}
.nav-logo img { height:40px; filter:drop-shadow(0 0 10px rgba(14,165,233,0.4)); }
.nav-logo-text {
display:flex; flex-direction:column;
font-family:var(--font-display); font-weight:800;
text-transform:uppercase; letter-spacing:1.5px;
line-height:1.05;
}
.nav-logo-text .l1 { font-size:1.15rem; color:var(--text); }
.nav-logo-text .l2 { font-size:1.15rem; color:var(--blue); }

.nav-links { display:flex; list-style:none; align-items:center; gap:0.25rem; }
.nav-links li span {
font-family:var(--font-mono); font-size:0.72rem; font-weight:400;
color:var(--text2); padding:0.4rem 0.9rem; border-radius:3px;
cursor:pointer; transition:all 0.2s; text-decoration:none;
border:1px solid transparent; letter-spacing:0.5px; display:block;
}
.nav-links li span:hover { color:var(--text); background: var(--blue-dim); border-color:var(--border); }
.nav-cta {
background: var(--blue)!important; color:var(--bg)!important;
border:1px solid var(--blue)!important; font-weight:600!important;
}
.nav-cta:hover { background:transparent!important; color:var(--blue)!important; box-shadow:0 0 20px var(--blue-glow)!important; }

.hamburger {
display:none; flex-direction:column; gap:5px; cursor:pointer;
padding:8px; border:1px solid var(--border2); border-radius:4px; background:transparent;
}
.hamburger span { display:block; width:22px; height:2px; background:var(--blue); border-radius:1px; transition:all 0.3s; }
.hamburger.open span:nth-child(1) { transform:translateY(7px) rotate(45deg); }
.hamburger.open span:nth-child(2) { opacity:0; }
.hamburger.open span:nth-child(3) { transform:translateY(-7px) rotate(-45deg); }

.mobile-menu {
display:none; position:fixed; top:64px; left:0; right:0; z-index:999;
background:rgba(6,10,16,0.98); backdrop-filter:blur(20px);
border-bottom:1px solid var(--border2);
flex-direction:column; padding:1rem 1.5rem 1.5rem;
}
.mobile-menu.open { display:flex; }
.mobile-menu span {
font-family:var(--font-mono); font-size:0.85rem; color:var(--text2);
padding:1rem 0; border-bottom:1px solid var(--border3);
cursor:pointer; letter-spacing:0.5px; transition:color 0.2s;
}
.mobile-menu span:hover { color:var(--blue); }
.mobile-menu span:last-child { border-bottom:none; }
.mobile-menu .m-cta {
margin-top:1rem; background:var(--blue); color:var(--bg);
text-align:center; padding:1rem; border-radius:3px;
font-weight:700; letter-spacing:1px; border-bottom:none !important;
}

.page { display:none; }
.page.active { display:block; }

/* ── SHARED ── */
.wrap { max-width:1200px; margin:0 auto; padding:0 2.5rem; }
.section { padding:8rem 2.5rem; position:relative; z-index:1; }
.section.alt { background: var(--bg2); }
.section.dark { background: var(--bg3); }

.eyebrow {
display:inline-flex; align-items:center; gap:0.5rem;
font-family:var(--font-mono); font-size:0.65rem; font-weight:500;
color:var(--blue); letter-spacing:3px; text-transform:uppercase; margin-bottom:1rem;
}
.eyebrow::before { content:’’; width:20px; height:1px; background: var(--blue); }...
